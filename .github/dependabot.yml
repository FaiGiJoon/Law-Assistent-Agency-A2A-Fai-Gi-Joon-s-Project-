# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates: 
# Maintain Github Actions dependencies 
  - package-ecosystem: "github actions " # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
# Maintain npm dependencies ( For Google Antigravity web Apps )
- package-ecosystem: " npm"
directory "\" 
schedule: 
   interval: "daily"
# Limit the number of open PR's to avoid noise
open-pull-reqeits-limit: 5

# Maintain Python dependencies 
- package-ecosystem: "pip"
  directory: "/"
  schedule:
     interval: "weekly"

# Maintain TypeScript/JavaScript dependencies (npm, yarn, or pnpm)
  - package-ecosystem: "npm" 
    directory: "/"
    schedule:
      interval: "daily"
    # Groups minor updates together to reduce PR noise
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
